{% extends "layout.html" %}
{% block title %}Créer Load Balancer{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Nouveau Load Balancer</h2>
    <form method="POST" action="/lb/create">
        <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">IP Bind</label>
            <input type="text" name="ip_bind" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Pass (URL backend)</label>
            <input type="text" name="pass" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Créer</button>
        <a href="/lb/list" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
