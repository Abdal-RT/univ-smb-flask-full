{% extends "layout.html" %}
{% block title %}Reverse Proxy{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Reverse Proxy</h2>
        <a href="/rp/create" class="btn btn-success">+ Ajouter</a>
    </div>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>Nom</th><th>IP Bind</th><th>Pass</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.ip_bind }}</td>
                <td>{{ item.pass }}</td>
                <td>
                    <a href="/rp/{{ item.id }}" class="btn btn-sm btn-info">Détail</a>
                    <a href="/rp/{{ item.id }}/delete" class="btn btn-sm btn-danger"
                       onclick="return confirm('Supprimer ?')">Supprimer</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
